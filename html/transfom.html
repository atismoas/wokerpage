<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
</head>
<style>
    .redball {
        height: 200px;
        width: 200px;
        background-color: red;
        border-radius: 100px;
        margin: 30px 30px;
        position: fixed;
    }


    .ball1 {
        animation: move1 3s alternate infinite ease-in-out;
        left: 0;
    }

    .ball2 {
        top: 260px;
        animation: move2 3s alternate infinite ease-in-out;
    }

    @keyframes move2 {
        to {
            transform: translateX(200px);
        }
    }


    @keyframes move1 {
        to {
            left: 200px;
        }

    }
</style>

<body>
    <button>死循环</button>

    <div class="redball ball1">1</div>
    <div class="redball ball2">2</div>
</body>
<script>
    const btn = document.querySelector("button")
    btn.onclick = () => {
        console.log("123")
        delay(3000)
    }
    function delay(de) {
        const start = Date.now()
        while (Date.now() - start < de) {
        }
    }

</script>

</html>
